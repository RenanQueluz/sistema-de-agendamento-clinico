<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Agendamento.css">
    <title>Document</title>
</head>

<body>
    <header>
        <img class="logo-topo" src="src/download.png" height="150px" alt="">
    </header>


    <form id="form">
        <div class="formulario">
            <h1>cadastro de pacientes</h1>

            <label>Data da consulta:</label>
            <input type="date" id="data" name="data">

            <label>Horário da consulta:</label>
            <input type="time" id="horas" name="horario">

            <label>Paciente:</label>
            <input type="text" id="paciente" name="paciente">

            <label>Telefone:</label>
            <input type="tel" id="telefone" name="telefone">

            <label>Médico responsável:</label>
            <input type="text" id="medico" name="medico">

            <label>Plano de saúde:</label>
            <select name="plano" id="plano" class="campos">
                <option value="">Selecione o plano</option>
                <option value="Unimed">Unimed</option>
                <option value="Bradesco">Bradesco Saúde</option>
                <option value="Amil">Amil</option>
                <option value="SulAmerica">SulAmérica</option>
                <option value="Particular">Particular</option>
            </select>



            <button type="submit">Cadastrar paciente</button>
        </div>
    </form>

    <section class="buscar">
        <h2> Buscar agendamentos:</h2>
        <div class="containers">
            <label for=""> Buscar agendas do dia:</label>
            <input type="date" id="data-busca">
            <button class="btn-pesquisar" onclick="buscarData()"> Buscar agendas </button>
            <br>
            <br>

            <div class="resultado" id="resultado">


            </div>

        </div>
    </section>


    <script>

        //cadastro de usuario
        const formulario = document.getElementById('form')

        formulario.addEventListener('submit', async (event) => {
            event.preventDefault()

            try {
                let pacientes = {

                    data_consulta: document.getElementById('data').value,
                    horario_consulta: document.getElementById('horas').value,
                    nome_paciente: document.getElementById('paciente').value,
                    contato: document.getElementById('telefone').value,
                    nome_medico: document.getElementById('medico').value,
                    plano_saude: document.getElementById('plano').value,
                }


                const resposta = await fetch('http://localhost:3000/paciente', {
                    method: 'POST',
                    headers: {
                        'content-type': 'application/json'
                    },

                    body: JSON.stringify({ pacientes }),

                })

                const resultado = await resposta.json()

                if (resposta.ok) {
                    formulario.reset()
                    alert('Novo agendamento criado')
                }
                else {
                    formulario.reset()
                    alert('Erro em cadastrar agendamento')
                    return
                }

            }

            catch (erro) {
                alert('parece que estamos com problema no servidor tente mais tarde')
                console.log(erro)

            }
        });


        //exibir pacientes cadastrados

        //em desenvolvimento final...(ja esta funcionando, data para testar (23/03/2026)

        async function buscarData() {

            try {
                const pesquisa = document.getElementById('data-busca').value;

                if (!pesquisa) {
                    alert('Selecione uma data');
                    return;
                }

                const resposta = await fetch(
                    `http://localhost:3000/pesquisas?data=${pesquisa}`
                );

                const resultado = await resposta.json();

                // erro da API
                if (!resposta.ok) {
                    alert('nenhum usuario encontrado');
                    return;
                }

                // nenhum resultado encontrado
                if (!resultado || resultado.length === 0) {
                    alert('Nenhum agendamento encontrado');
                    document.getElementById('resultado').innerHTML = '';
                    return;
                }

                // mostrar dados
                const divResultado = document.getElementById('resultado');

                let tabela = `
<table border="2">
    <thead>
        <tr>
            <th>Horário</th>
            <th>Paciente</th>
            <th>Contato</th>
            <th>Médico(a)</th>
            <th>Plano</th>
            <th>Data</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
`;
                resultado.forEach(consulta => {

                    // formatar data
                    const dataFormatada =
                        new Date(consulta.data_consulta)
                            .toLocaleDateString('pt-BR');

                    tabela += `
        <tr>
            <td>${consulta.horario}</td>
            <td>${consulta.nome_paciente}</td>
            <td>${consulta.contato}</td>
            <td>${consulta.nome_medico}</td>
            <td>${consulta.tipo}</td>
            <td>${dataFormatada}</td>
            
        <td>
            <button class="edição-excluir" onclick="deletarPaciente(${consulta.id})">
                 <img src="src/excluir.png" height="18px" alt="">
            </button>

            <button class="edição-editar" onclick="editarCosulta(${consulta.id})">
                 <img src="src/editar.png" height="18px" alt="">
            </button>


            
        </td>
    
        </tr>
    `;
                });

                tabela += `</tbody></table>`;

                divResultado.innerHTML = tabela;

            } catch (erro) {
                console.error(erro);
                alert('Problema no servidor. Tente novamente mais tarde.');
            }
        }

        async function deletarPaciente(id) { // função para deletar os pacientes cadastrados

            try {
                const resposta = await fetch(`http://localhost:3000/deletar/${id}`, {
                    method: "DELETE"
                });

                const dados = await resposta.json();

                if (dados.ok){
                    alert('paciente apagado')
                    buscarData() // vai atualizar a tabela e continuar existente
                } else{
                    alert('erro em deletar paciente')
                }

            } catch (erro) {
                alert("Erro ao deletar paciente");
            }

        }
    </script>


</body>

</html>
